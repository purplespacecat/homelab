---
# Default deny all traffic in otel-demo namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: otel-demo
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Allow OpenTelemetry Collector to send traces to Tempo
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otel-collector
  namespace: otel-demo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: opentelemetry-collector
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Accept traces from demo services
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: otel-demo
    ports:
    - protocol: TCP
      port: 4317  # OTLP gRPC
    - protocol: TCP
      port: 4318  # OTLP HTTP
    - protocol: TCP
      port: 9411  # Zipkin
    - protocol: TCP
      port: 14250 # Jaeger gRPC
    - protocol: TCP
      port: 14268 # Jaeger HTTP
  egress:
  # Send traces to Tempo
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      podSelector:
        matchLabels:
          app.kubernetes.io/name: tempo
    ports:
    - protocol: TCP
      port: 4317  # OTLP gRPC
    - protocol: TCP
      port: 4318  # OTLP HTTP
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---
# Allow demo services to communicate with each other
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-demo-services
  namespace: otel-demo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: otel-demo
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Accept traffic from other demo services
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: otel-demo
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
  egress:
  # Allow communication to other demo services
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: otel-demo
  # Allow sending traces to collector
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: opentelemetry-collector
    ports:
    - protocol: TCP
      port: 4317
    - protocol: TCP
      port: 4318
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---
# Allow frontend to be accessed from ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
  namespace: otel-demo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: otel-demo
