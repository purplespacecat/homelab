apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 9090
  egress:
  # Kubernetes API — REQUIRED for service discovery. Without it the scrape
  # ports below are moot: SD returns zero targets, so Prometheus scrapes
  # nothing (not even itself) and every existing alert goes silently blind.
  # Same port-only pattern as allow-grafana / allow-kube-state-metrics.
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
  # DNS — resolve scrape-target and API service names.
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 9100  # Node exporter
    - protocol: TCP
      port: 8080  # kube-state-metrics + prometheus-operator + alertmanager reloader
    - protocol: TCP
      port: 10250 # Kubelet
    - protocol: TCP
      port: 3000  # Grafana
    - protocol: TCP
      port: 9093  # Alertmanager
    - protocol: TCP
      port: 9153  # CoreDNS (kube-system)
  # node-exporter (hostNetwork) and the kubelet/cAdvisor endpoint live on the
  # NODE IP, not a pod IP — a namespaceSelector can never match them, so the
  # rule above is a no-op for those two targets and they stay down (no
  # node_filesystem / container_* metrics). An ipBlock to the node is required.
  # Node IP is ${NODE_IP} in cluster-config; static here since this file isn't
  # var-substituted. Update both if the node IP ever changes.
  - to:
    - ipBlock:
        cidr: 192.168.100.98/32
    ports:
    - protocol: TCP
      port: 9100   # node-exporter (hostNetwork)
    - protocol: TCP
      port: 10250  # kubelet / cAdvisor
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-state-metrics
  namespace: monitoring
spec:
  # Forgotten when the other allow-* policies were written: default-deny
  # rejected every scrape of kube-state-metrics, so kube_* metrics (and the
  # Flux gotk_resource_info series) never reached Prometheus — silently,
  # since the target-down alerts routed to the null receiver.
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
    ports:
    - protocol: TCP
      port: 8080  # metrics
    - protocol: TCP
      port: 8081  # telemetry (self-metrics)
  egress:
  # Watches the Kubernetes API (port-only egress, same pattern as grafana)
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    # Prometheus scrapes Grafana's own /metrics on 3000 (self-health).
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
    ports:
    - protocol: TCP
      port: 9090
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: loki
    ports:
    - protocol: TCP
      port: 3100  # Direct Loki API
    - protocol: TCP
      port: 80    # Loki gateway service port
    - protocol: TCP
      port: 8080  # Loki gateway container port
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: tempo
    ports:
    - protocol: TCP
      port: 3100  # Tempo HTTP API
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53  # DNS
    - protocol: UDP
      port: 53
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alertmanager
  namespace: monitoring
spec:
  # NB: modern kube-prometheus-stack pods carry app.kubernetes.io/name, not
  # the legacy bare "app" label — the old selectors here never matched
  # anything, so default-deny silently rejected ALL alertmanager traffic
  # (including DNS, Telegram delivery, and Prometheus -> alertmanager 9093).
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
    ports:
    - protocol: TCP
      port: 9093
    # Prometheus also scrapes the config-reloader sidecar's /metrics on 8080.
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: alertmanager
    ports:
    - protocol: TCP
      port: 9093
    - protocol: TCP
      port: 9094
  - {}  # Allow outbound traffic for alerts (Telegram, webhooks, DNS)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-loki
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3100  # Loki HTTP
    - protocol: TCP
      port: 8080  # Loki gateway
    - protocol: TCP
      port: 9095  # Loki GRPC
  egress:
  - {}  # Allow all egress for storage access
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-promtail
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: promtail
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 3101  # Promtail HTTP metrics
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: loki
    ports:
    - protocol: TCP
      port: 3100  # Direct Loki API
    - protocol: TCP
      port: 80    # Loki gateway service port
    - protocol: TCP
      port: 8080  # Loki gateway container port
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53  # DNS
    - protocol: UDP
      port: 53
  # Allow egress to Kubernetes API server (any destination on port 443/6443)
  - ports:
    - protocol: TCP
      port: 443  # Kubernetes API (ClusterIP)
    - protocol: TCP
      port: 6443  # Kubernetes API (node port/external)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tempo
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tempo
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Accept traces from monitoring namespace (Grafana queries)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 3100  # Tempo HTTP API
  # Accept from ingress for UI access (optional)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3100
  egress:
  - {}  # Allow all egress for storage access
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-operator
  namespace: monitoring
spec:
  # Was previously created out-of-band (not in this repo) as an Egress-only
  # policy, so default-deny-all still blocked ALL ingress to the operator —
  # Prometheus couldn't scrape its /metrics (8080) and the target stayed down.
  # Now Git-managed: same egress (API + DNS) it had, plus the missing ingress.
  # NB: the operator carries the legacy bare `app` label (unlike the stack's
  # other pods) — this selector is correct for it.
  podSelector:
    matchLabels:
      app: kube-prometheus-stack-operator
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
    ports:
    - protocol: TCP
      port: 8080  # operator /metrics
  egress:
  # Manages CRs via the Kubernetes API.
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
  # DNS.
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53