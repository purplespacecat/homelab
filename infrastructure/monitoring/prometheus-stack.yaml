apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-stack
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.17.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    # Prometheus configuration
    prometheus:
      prometheusSpec:
        retention: 2d
        # Allow Prometheus to discover ServiceMonitors in all namespaces
        serviceMonitorNamespaceSelector: {}
        serviceMonitorSelector: {}
        podMonitorNamespaceSelector: {}
        podMonitorSelector: {}
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-client
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      # No ingress: the Prometheus UI/API is unauthenticated — port-forward
      # on demand instead of exposing it to the LAN (see docs/alerting.md).

    # Grafana configuration
    grafana:
      enabled: true
      # Stateless: everything (datasources, dashboards) is provisioned from
      # this repo, so the DB is rebuilt from provisioning on every start. A
      # persisted grafana.db can hold datasource rows whose uids predate the
      # pinned ones below — Grafana 12 treats that provisioning mismatch as a
      # fatal startup error (crashlooped for 74 days in 2026-04..07).
      persistence:
        enabled: false
      admin:
        existingSecret: "grafana-admin-credentials"
        userKey: admin-user
        passwordKey: admin-password
      ingress:
        enabled: true
        ingressClassName: nginx
        # TLS from the homelab CA (k8s/cert-manager/local-ca.yaml); nginx
        # redirects HTTP→HTTPS once tls: is set. Trust the CA in your browser
        # via scripts/common/extract-ca-cert.sh.
        annotations:
          cert-manager.io/cluster-issuer: homelab-ca-issuer
        hosts:
          - grafana.${NODE_IP}.nip.io
          - grafana.local
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.${NODE_IP}.nip.io
              - grafana.local
      # Dashboards from Grafana.com
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: grafana-dashboards
              orgId: 1
              folder: Homelab
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/grafana-dashboards
      dashboards:
        grafana-dashboards:
          node-exporter:
            gnetId: 1860
            revision: 37
            datasource: Prometheus
          k8s-cluster:
            gnetId: 7249
            revision: 1
            datasource: Prometheus
          flux-cluster:
            gnetId: 16714
            revision: 1
            datasource: Prometheus
          loki-logs:
            gnetId: 13639
            revision: 2
            datasource: Loki
      # Datasources (Prometheus + Alertmanager are provided by the chart's sidecar)
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          url: http://loki-gateway:80
          access: proxy
          isDefault: false
          jsonData:
            maxLines: 1000
        - name: Tempo
          type: tempo
          uid: tempo
          url: http://tempo:3100
          access: proxy
          isDefault: false
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              filterByTraceID: true
            tracesToLogs:
              datasourceUid: loki
              filterByTraceID: true
              filterBySpanID: false
              mapTagNamesEnabled: false
              tags: ['job', 'instance', 'pod', 'namespace']
            tracesToMetrics:
              datasourceUid: prometheus
              queries:
                - name: 'Sample query'
                  query: 'rate(traces_spanmetrics_latency_bucket{$$__tags}[5m])'
            nodeGraph:
              enabled: true
            serviceMap:
              datasourceUid: prometheus
            search:
              hide: false
            lokiSearch:
              datasourceUid: loki

    # Alertmanager configuration
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-client
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        # Mounts the manually-created Secret (see CLAUDE.md "Secrets") at
        # /etc/alertmanager/secrets/alertmanager-telegram/ — the bot token
        # never appears in this (public) repo.
        secrets:
          - alertmanager-telegram
      # Route warning/critical to Telegram. The chat id is not a credential
      # (useless without the bot token) so substitution from cluster-config
      # is fine. Watchdog and info-level alerts stay on the null receiver.
      config:
        route:
          receiver: "null"
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - receiver: telegram
              matchers:
                - severity =~ "warning|critical"
        receivers:
          - name: "null"
          - name: telegram
            telegram_configs:
              - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/token
                chat_id: ${TELEGRAM_CHAT_ID}
                parse_mode: HTML
                send_resolved: true
                message: |-
                  {{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} <b>{{ .CommonLabels.alertname }}</b> ({{ .Status }})
                  {{ range .Alerts }}{{ .Annotations.summary }}
                  {{ .Annotations.description }}
                  {{ end }}
        inhibit_rules:
          - source_matchers: ['severity = "critical"']
            target_matchers: ['severity = "warning"']
            equal: ["alertname", "namespace"]
      # No ingress: the Alertmanager UI/API is unauthenticated — anyone on
      # the LAN could silence real alerts or inject fakes into the Telegram
      # pipe. Port-forward on demand (see docs/alerting.md).

    # Disable components not available in some clusters
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false

    # Enable exporters
    nodeExporter:
      enabled: true
    kubeStateMetrics:
      enabled: true

    # kube-state-metrics subchart: export Flux CR readiness as
    # gotk_resource_info metrics (Flux controllers no longer expose
    # per-resource status themselves — this is the flux2-monitoring-example
    # approach). Powers the flux-alerts PrometheusRule, most importantly
    # FluxGitSourceNotReady: the "GitHub token expired, cluster silently
    # frozen" alarm (bitten by this 2026-07).
    kube-state-metrics:
      rbac:
        extraRules:
          - apiGroups:
              - source.toolkit.fluxcd.io
              - kustomize.toolkit.fluxcd.io
              - helm.toolkit.fluxcd.io
            resources:
              - gitrepositories
              - helmrepositories
              - kustomizations
              - helmreleases
            verbs: ["list", "watch"]
      customResourceState:
        enabled: true
        config:
          spec:
            resources:
              - groupVersionKind:
                  group: kustomize.toolkit.fluxcd.io
                  version: v1
                  kind: Kustomization
                metricNamePrefix: gotk
                metrics:
                  - name: resource_info
                    help: The current state of a Flux Kustomization resource.
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, lastAppliedRevision]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: GitRepository
                metricNamePrefix: gotk
                metrics:
                  - name: resource_info
                    help: The current state of a Flux GitRepository resource.
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: HelmRepository
                metricNamePrefix: gotk
                metrics:
                  - name: resource_info
                    help: The current state of a Flux HelmRepository resource.
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      url: [spec, url]
              - groupVersionKind:
                  group: helm.toolkit.fluxcd.io
                  version: v2
                  kind: HelmRelease
                metricNamePrefix: gotk
                metrics:
                  - name: resource_info
                    help: The current state of a Flux HelmRelease resource.
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, lastAppliedRevision]

    # Prometheus Operator
    prometheusOperator:
      admissionWebhooks:
        enabled: false
      tls:
        enabled: false
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
