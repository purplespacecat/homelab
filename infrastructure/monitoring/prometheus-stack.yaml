apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-stack
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.17.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    # Prometheus configuration
    prometheus:
      prometheusSpec:
        retention: 2d
        # Allow Prometheus to discover ServiceMonitors in all namespaces
        serviceMonitorNamespaceSelector: {}
        serviceMonitorSelector: {}
        podMonitorNamespaceSelector: {}
        podMonitorSelector: {}
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-client
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - prometheus.${NODE_IP}.nip.io
          - prometheus.local

    # Grafana configuration
    grafana:
      enabled: true
      persistence:
        enabled: true
        storageClassName: nfs-client
        size: 10Gi
      admin:
        existingSecret: "grafana-admin-credentials"
        userKey: admin-user
        passwordKey: admin-password
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana.${NODE_IP}.nip.io
          - grafana.local
      # Dashboards from Grafana.com
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: grafana-dashboards
              orgId: 1
              folder: Homelab
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/grafana-dashboards
      dashboards:
        grafana-dashboards:
          node-exporter:
            gnetId: 1860
            revision: 37
            datasource: Prometheus
          k8s-cluster:
            gnetId: 7249
            revision: 1
            datasource: Prometheus
          flux-cluster:
            gnetId: 16714
            revision: 1
            datasource: Prometheus
          loki-logs:
            gnetId: 13639
            revision: 2
            datasource: Loki
      # Datasources (Prometheus + Alertmanager are provided by the chart's sidecar)
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          url: http://loki-gateway:80
          access: proxy
          isDefault: false
          jsonData:
            maxLines: 1000
        - name: Tempo
          type: tempo
          uid: tempo
          url: http://tempo:3100
          access: proxy
          isDefault: false
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              filterByTraceID: true
            tracesToLogs:
              datasourceUid: loki
              filterByTraceID: true
              filterBySpanID: false
              mapTagNamesEnabled: false
              tags: ['job', 'instance', 'pod', 'namespace']
            tracesToMetrics:
              datasourceUid: prometheus
              queries:
                - name: 'Sample query'
                  query: 'rate(traces_spanmetrics_latency_bucket{$$__tags}[5m])'
            nodeGraph:
              enabled: true
            serviceMap:
              datasourceUid: prometheus
            search:
              hide: false
            lokiSearch:
              datasourceUid: loki

    # Alertmanager configuration
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-client
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - alertmanager.${NODE_IP}.nip.io
          - alertmanager.local

    # Disable components not available in some clusters
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false

    # Enable exporters
    nodeExporter:
      enabled: true
    kubeStateMetrics:
      enabled: true

    # Prometheus Operator
    prometheusOperator:
      admissionWebhooks:
        enabled: false
      tls:
        enabled: false
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
