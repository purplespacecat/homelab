apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-stack
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 55.0.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    # Prometheus configuration
    prometheus:
      prometheusSpec:
        retention: 2d
        # Allow Prometheus to discover ServiceMonitors in all namespaces
        serviceMonitorNamespaceSelector: {}
        serviceMonitorSelector: {}
        podMonitorNamespaceSelector: {}
        podMonitorSelector: {}
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-client
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - prometheus.192.168.100.98.nip.io
          - prometheus.local

    # Grafana configuration
    grafana:
      enabled: true
      persistence:
        enabled: true
        storageClassName: nfs-client
        size: 10Gi
      adminPassword: admin
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana.192.168.100.98.nip.io
          - grafana.local
      # Datasources
      additionalDataSources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-stack-kube-prom-prometheus:9090
          access: proxy
          isDefault: true
          jsonData:
            timeInterval: 30s
        - name: Loki
          type: loki
          url: http://loki-gateway:80
          access: proxy
          isDefault: false
          jsonData:
            maxLines: 1000
        - name: Tempo
          type: tempo
          url: http://tempo:3100
          access: proxy
          isDefault: false
          jsonData:
            # Link traces to logs
            tracesToLogs:
              datasourceUid: Loki
              filterByTraceID: true
              filterBySpanID: false
              mapTagNamesEnabled: false
              tags: ['job', 'instance', 'pod', 'namespace']
            # Link traces to metrics
            tracesToMetrics:
              datasourceUid: Prometheus
              queries:
                - name: 'Sample query'
                  query: 'rate(traces_spanmetrics_latency_bucket{$$__tags}[5m])'
            serviceMap:
              datasourceUid: Prometheus
            nodeGraph:
              enabled: true
            search:
              hide: false
            lokiSearch:
              datasourceUid: Loki

    # Alertmanager configuration
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-client
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - alertmanager.192.168.100.98.nip.io
          - alertmanager.local

    # Disable components not available in some clusters
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false

    # Enable exporters
    nodeExporter:
      enabled: true
    kubeStateMetrics:
      enabled: true

    # Prometheus Operator
    prometheusOperator:
      admissionWebhooks:
        enabled: false
      tls:
        enabled: false
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
