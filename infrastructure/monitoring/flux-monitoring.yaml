---
# Scrape the Flux controllers' metrics.
#
# A PodMonitor, not ServiceMonitors: Flux's Services expose only port 80
# (http) — the http-prom metrics port exists solely on the pods, so the four
# ServiceMonitors this file used to hold never scraped anything (they also
# lacked the `release: prometheus-stack` label the Prometheus operator
# selects on). Per-resource readiness (gotk_resource_info) comes from
# kube-state-metrics customResourceState in prometheus-stack.yaml; this
# covers controller-level metrics (reconcile durations, workqueues, errors).
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: flux-controllers
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: flux
    release: prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - flux-system
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - source-controller
          - kustomize-controller
          - helm-controller
          - notification-controller
  podMetricsEndpoints:
    - port: http-prom
      interval: 30s
