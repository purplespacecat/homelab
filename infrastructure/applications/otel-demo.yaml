---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-demo
  namespace: otel-demo
spec:
  interval: 5m
  chart:
    spec:
      chart: opentelemetry-demo
      version: 0.31.0
      sourceRef:
        kind: HelmRepository
        name: opentelemetry
        namespace: flux-system
  values:
    # OpenTelemetry Demo configuration
    # Using demo's default collector config for now

    # Components to enable
    components:
      # Frontend - web UI to generate traffic
      frontend:
        enabled: true
        service:
          type: ClusterIP

      # Backend services
      accountingService:
        enabled: true
      adService:
        enabled: true
      cartService:
        enabled: true
      checkoutService:
        enabled: true
      currencyService:
        enabled: true
      emailService:
        enabled: true
      paymentService:
        enabled: true
      productCatalogService:
        enabled: true
      recommendationService:
        enabled: true
      shippingService:
        enabled: true

      # Load generator - creates realistic traffic
      loadgenerator:
        enabled: true
        env:
          - name: LOCUST_USERS
            value: "10"
          - name: LOCUST_SPAWN_RATE
            value: "1"
          - name: LOCUST_RUN_TIME
            value: "24h"

      # Kafka for async messaging
      kafka:
        enabled: true

  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
